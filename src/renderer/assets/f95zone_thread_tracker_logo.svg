<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#922b21;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="18" width="6" height="124" rx="2" fill="url(#redGrad)"/>
  <rect x="10" y="18" width="26" height="6" rx="2" fill="url(#redGrad)"/>
  <rect x="10" y="136" width="26" height="6" rx="2" fill="url(#redGrad)"/>

  <rect x="46" y="34" width="48" height="8" rx="2" fill="#e8e8e8" opacity="0.95"/>
  <rect x="46" y="52" width="36" height="8" rx="2" fill="#e8e8e8" opacity="0.95"/>
  <rect x="46" y="70" width="52" height="8" rx="2" fill="#e8e8e8" opacity="0.95"/>
  <rect x="46" y="88" width="30" height="8" rx="2" fill="#e8e8e8" opacity="0.95"/>
  <rect x="46" y="106" width="44" height="8" rx="2" fill="#e8e8e8" opacity="0.95"/>
  <rect x="46" y="124" width="38" height="8" rx="2" fill="#e8e8e8" opacity="0.95"/>

  <circle cx="40" cy="38" r="5" fill="url(#redGrad)" filter="url(#glow)"/>
  <circle cx="40" cy="56" r="5" fill="#3a3a3a"/>
  <circle cx="40" cy="74" r="5" fill="url(#redGrad)" filter="url(#glow)"/>
  <circle cx="40" cy="92" r="5" fill="url(#redGrad)" filter="url(#glow)"/>
  <circle cx="40" cy="110" r="5" fill="#3a3a3a"/>
  <circle cx="40" cy="128" r="5" fill="url(#redGrad)" filter="url(#glow)"/>

  <rect x="104" y="18" width="6" height="124" rx="2" fill="url(#redGrad)"/>
  <rect x="84" y="18" width="26" height="6" rx="2" fill="url(#redGrad)"/>
  <rect x="84" y="136" width="26" height="6" rx="2" fill="url(#redGrad)"/>

  <text
    x="126"
    y="84"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="-1"
    fill="#f0f0f0"
  >F95</text>

  <text
    x="230"
    y="84"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="-1"
    fill="url(#redGrad)"
  >ZONE</text>

  <rect x="126" y="94" width="262" height="3" rx="1" fill="url(#redGrad)" opacity="0.7"/>

  <text
    x="128"
    y="120"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-weight="400"
    font-size="17"
    letter-spacing="5"
    fill="#cccccc"
  >THREAD TRACKER</text>
</svg>
